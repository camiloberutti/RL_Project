behaviors:
  ShooterBrain:
    trainer_type: ppo
    time_horizon: 256        # Covers full flight arc + settle time (3s wait at 50fps = 150 steps)
    max_steps: 30000000      # Ballistics + moving target needs much more training time
    summary_freq: 10000      

    hyperparameters:
      learning_rate: 2.0e-4  # Slightly lower — more stable for sparse rewards
      batch_size: 2048        # Reduced: your episodes are SHORT (one shot then wait)
      buffer_size: 20480      # Keep 10x ratio with batch_size
      beta: 5.0e-3            # HIGHER entropy bonus — forces exploration of pitch/yaw/force combos
      epsilon: 0.15           # Tighter clipping — prevents policy from lurching on sparse reward
      lambd: 0.95             # LOWER than 0.99 — reduces variance in long wait-timer episodes
      num_epoch: 4            # One extra pass per buffer — helps with small obs space
      learning_rate_schedule: linear

    network_settings:
      normalize: true         # CRITICAL — yaw spans [-90,90], pitch [-89,11]: very different scales
      hidden_units: 128       # Your obs space is only 2 values — 256 is severe overkill
      num_layers: 2           # Same reason — deeper nets need richer inputs to justify depth

    reward_signals:
      extrinsic:
        gamma: 0.995          # HIGHER — the reward arrives ~150+ steps after the action
        strength: 1.0
      curiosity:              # ADD THIS — critical for sparse reward with moving targets
        gamma: 0.99
        strength: 0.05
        encoding_size: 64
        learning_rate: 1.0e-3

torch_settings:
  device: cuda