behaviors:
  ShooterBrain:
    trainer_type: ppo
    time_horizon: 64        
    max_steps: 20000000       
    summary_freq: 25000      

    hyperparameters:
      learning_rate: 1.0e-4  # Slightly lower — more stable for sparse rewards
      batch_size: 512        # Reduced: your episodes are SHORT (one shot then wait)
      buffer_size: 5120      # Keep 10x ratio with batch_size
      beta: 5.0e-3            # HIGHER entropy bonus — forces exploration of pitch/yaw/force combos
      epsilon: 0.15           # Tighter clipping — prevents policy from lurching on sparse reward
      lambd: 0.90             # LOWER — short episodes need less lookahead for advantage estimation
      num_epoch: 4            # One extra pass per buffer — helps with small obs space
      learning_rate_schedule: linear

    network_settings:
      normalize: true         
      hidden_units: 128       
      num_layers: 2           

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

torch_settings:
  device: cuda