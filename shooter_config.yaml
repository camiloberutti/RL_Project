behaviors:
  ShooterBrain:
    trainer_type: ppo
    time_horizon: 128        # [Run 2] Mayor tiempo para observar el vuelo del pájaro | [Run 1] era: 64
    max_steps: 10000000      # [Run 2] 10 Millones de pasos para entrenar la red pesada | [Run 1] era: 1000000
    summary_freq: 25000      # [Run 2] Actualiza TensorBoard el doble de rápido | [Run 1] era: 50000
    
    hyperparameters:
      learning_rate: 3.0e-4
      batch_size: 1024       # [Run 2] Recolecta más tiros antes de actualizar para mayor estabilidad | [Run 1] era: 1024
      buffer_size: 10240     # [Run 2] Aumentado para mantener la proporción 10x con el batch_size | [Run 1] era: 10240
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.99
      num_epoch: 3
      learning_rate_schedule: linear
      
    network_settings:
      normalize: false
      hidden_units: 256      # [Run 2] Red más "ancha" (capacidad de cálculo complejo) | [Run 1] era: 128
      num_layers: 3          # [Run 2] Red más "profunda" (mayor abstracción geométrica) | [Run 1] era: 2
      
    reward_signals:
      extrinsic:
        gamma: 0.99          # Mantiene el enfoque en la gratificación a largo plazo
        strength: 1.0

# Configuracion global de hardware
torch_settings:
  device: cuda               # [Run 2] Activa la aceleración por hardware (GPU) | [Run 1] era: cpu